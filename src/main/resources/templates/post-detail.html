<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${baiViet.tieuDe}">Chi tiết bài viết</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/post-detail.css}" />
  </head>
  <body>
    <!-- Navigation -->
    <div th:replace="~{Giaodien/Nav :: nav}"></div>

    <div class="container py-4">
      <div class="row g-4">
        <!-- Main Content -->
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <header class="mb-4">
                <h1 class="card-title mb-3" th:text="${baiViet.tieuDe}">
                  Tiêu đề bài viết
                </h1>
                <div
                  class="d-flex flex-wrap align-items-center text-muted small mb-3"
                >
                  <span
                    class="badge bg-primary me-2"
                    th:text="${baiViet.danhMuc.tenDanhMuc}"
                    >Danh mục</span
                  >
                  <span class="me-3"
                    ><i class="far fa-calendar-alt me-1"></i>
                    <span
                      th:text="${#temporals.format(baiViet.ngayDang, 'dd/MM/yyyy')}"
                      >Ngày đăng</span
                    ></span
                  >
                  <span class="me-3"
                    ><i class="fas fa-eye me-1"></i>
                    <span th:text="${baiViet.luotXem}">0</span> lượt xem</span
                  >
                </div>

                <div class="d-flex flex-wrap gap-2 mb-3">
                  <button
                    class="btn btn-outline-primary btn-sm like-btn d-flex align-items-center"
                    th:data-post-id="${baiViet.maBaiViet}"
                  >
                    <i class="fas fa-thumbs-up me-1"></i>
                    <span class="like-count" th:text="${likeCount}">0</span>
                  </button>
                  <button
                    class="btn btn-outline-secondary btn-sm dislike-btn d-flex align-items-center"
                    th:data-post-id="${baiViet.maBaiViet}"
                  >
                    <i class="fas fa-thumbs-down me-1"></i>
                    <span class="dislike-count" th:text="${dislikeCount}"
                      >0</span
                    >
                  </button>
                  <button
                    class="btn btn-outline-success btn-sm share-btn d-flex align-items-center"
                    th:data-post-id="${baiViet.maBaiViet}"
                  >
                    <i class="fas fa-envelope me-1"></i> Chia sẻ
                  </button>
                </div>
              </header>

              <figure class="figure mb-4 text-center">
                <img
                  th:src="${baiViet.hinhAnh}"
                  th:alt="${baiViet.tieuDe}"
                  class="figure-img img-fluid rounded"
                  style="max-height: 500px; width: auto"
                />
              </figure>

              <div class="post-content" th:utext="${baiViet.noiDung}">
                Nội dung bài viết
              </div>

              <!-- Social Share -->
              <div class="mt-5 pt-4 border-top">
                <h5 class="mb-3">Chia sẻ bài viết</h5>
                <div class="d-flex gap-2">
                  <a href="#" class="btn btn-sm btn-primary"
                    ><i class="fab fa-facebook-f me-1"></i> Facebook</a
                  >
                  <a href="#" class="btn btn-sm btn-info text-white"
                    ><i class="fab fa-twitter me-1"></i> Twitter</a
                  >
                  <a href="#" class="btn btn-sm btn-success"
                    ><i class="fab fa-whatsapp me-1"></i> WhatsApp</a
                  >
                  <a href="#" class="btn btn-sm btn-danger"
                    ><i class="fab fa-pinterest me-1"></i> Pinterest</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="col-lg-4">
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
              <h5 class="mb-0">
                <i class="fas fa-newspaper me-2"></i>Bài viết liên quan
              </h5>
            </div>
            <div class="card-body p-0">
              <div class="list-group list-group-flush">
                <th:block th:each="post : ${relatedPosts}">
                  <a
                    th:href="@{'/baiviet/' + ${post.duongDan}}"
                    class="list-group-item list-group-item-action p-3 hover-effect"
                  >
                    <div class="row g-2 align-items-center">
                      <div class="col-4">
                        <img
                          th:src="${post.hinhAnh}"
                          th:alt="${post.tieuDe}"
                          class="img-fluid rounded"
                          style="width: 100%; height: 70px; object-fit: cover"
                        />
                      </div>
                      <div class="col-8">
                        <h6 class="mb-1" th:text="${post.tieuDe}">
                          Tiêu đề bài viết liên quan
                        </h6>
                        <div class="small text-muted">
                          <i class="far fa-calendar-alt me-1"></i>
                          <span
                            th:text="${#temporals.format(post.ngayDang, 'dd/MM/yyyy')}"
                            >Ngày đăng</span
                          >
                        </div>
                      </div>
                    </div>
                  </a>
                </th:block>
              </div>
            </div>
          </div>

          <!-- Newsletter Signup -->
          <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white">
              <h5 class="mb-0">
                <i class="fas fa-envelope me-2"></i>Đăng ký nhận tin
              </h5>
            </div>
            <div class="card-body">
              <p class="card-text">
                Nhận thông báo khi có bài viết mới từ danh mục này
              </p>
              <form>
                <div class="mb-3">
                  <input
                    type="email"
                    class="form-control"
                    placeholder="Email của bạn"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Đăng ký
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{Giaodien/Foter :: footer}"></div>

    <!-- Share Modal -->
    <div
      class="modal fade"
      id="shareModal"
      tabindex="-1"
      aria-labelledby="shareModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="shareModalLabel">
              Chia sẻ bài viết qua email
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form class="share-form" id="shareForm">
              <div class="mb-3">
                <label for="recipientEmail" class="form-label"
                  >Email người nhận</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="recipientEmail"
                  name="email"
                  placeholder="Nhập email người nhận"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="senderName" class="form-label"
                  >Tên của bạn (không bắt buộc)</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="senderName"
                  name="senderName"
                />
              </div>
              <div class="mb-3">
                <label for="message" class="form-label"
                  >Lời nhắn (không bắt buộc)</label
                >
                <textarea
                  class="form-control"
                  id="message"
                  name="message"
                  rows="3"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">Gửi</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom JS -->
    <script th:src="@{/js/nav.js}" defer></script>
    <script th:src="@{/js/post-detail.js}" defer></script>
  </body>
</html>
